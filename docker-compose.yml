# Sovereign-OS: TUI + Redis + ChromaDB (memory) volume
# Usage: docker compose up -d redis && docker compose run --rm -it app

services:
  app:
    build: .
    image: sovereign-os:latest
    stdin_open: true
    tty: true
    environment:
      - SOVEREIGN_DATA_DIR=/app/data
      - REDIS_URL=redis://redis:6379/0
      - SOVEREIGN_HEALTH_PORT=8080
      - SOVEREIGN_PROMETHEUS_PORT=9464
    volumes:
      - sovereign_data:/app/data
    ports:
      - "9464:9464"   # Prometheus metrics
      - "8080:8080"   # Health API (if started)
    depends_on:
      redis:
        condition: service_healthy
    # Optional: run health server in background and then TUI
    command: ["python", "-m", "sovereign_os.ui.app"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5)\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 2
      start_period: 20s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

volumes:
  sovereign_data:
    # ChromaDB and ledger persistence
  redis_data:
