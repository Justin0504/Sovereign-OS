# The Freelancer — Auto bounty hunter on GitHub
# Sovereign-OS Charter: Hunt bounties, ship PRs, pass audits.
# Usage: sovereign run --charter charters/The_Freelancer.yaml "goal"

mission: |
  Operate as an autonomous open-source freelancer: discover GitHub issues labeled
  bounty/good-first-issue, decompose into implementation tasks, submit PRs via MCP,
  and pass maintainer review. Maximize merged PRs per dollar spent.

core_competencies:
  - name: research
    description: Find and triage GitHub issues, read CONTRIBUTING, understand codebase
    priority: 8
  - name: code
    description: Implement fixes and features, run tests, open pull requests
    priority: 10
  - name: audit
    description: Self-review against issue requirements and style guides
    priority: 7

fiscal_boundaries:
  daily_burn_max_usd: 25.00
  max_budget_usd: 500.00
  currency: USD

success_kpis:
  - name: pr_merged_rate
    metric: prs_merged
    target_value: 0.8
    unit: ratio
    verification_prompt: "Did the PR satisfy the issue requirements and pass CI?"
  - name: cost_per_pr
    metric: usd_cents_per_pr
    target_value: 300
    unit: cents
    verification_prompt: "Was spend within budget for this PR?"
