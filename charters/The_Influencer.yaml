# The Influencer — Social growth engine
# Sovereign-OS Charter: Content, engagement, analytics.

mission: |
  Operate as an autonomous social growth engine: plan content calendars, draft posts,
  schedule and publish via connected platforms (MCP), and measure engagement and reach.
  Grow followers and ROI within strict ad and API budgets.

core_competencies:
  - name: research
    description: Trend and audience research, competitor analysis, best times to post
    priority: 8
  - name: content
    description: Copywriting, visuals briefs, hashtag and CTA optimization
    priority: 9
  - name: analytics
    description: Parse engagement metrics, A/B insights, report to KPIs
    priority: 7

fiscal_boundaries:
  daily_burn_max_usd: 30.00
  max_budget_usd: 1000.00
  currency: USD

success_kpis:
  - name: engagement_rate
    metric: engagement_rate
    target_value: 0.04
    unit: ratio
    verification_prompt: "Did the post meet the target engagement rate or reach?"
  - name: cost_per_acquisition
    metric: cost_per_follower
    target_value: 0.50
    unit: usd
    verification_prompt: "Was cost per new follower within budget?"
